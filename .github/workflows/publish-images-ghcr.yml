name: Build and publish images to Docker Hub

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

permissions:
  contents: read
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push operator image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            pushpak23/powerdns-platform-operator:v0.1.0

      - name: Build and push powerdns authoritative image
        uses: docker/build-push-action@v4
        with:
          context: ./images/powerdns
          file: ./images/powerdns/Dockerfile
          push: true
          tags: |
            pushpak23/powerdns-authoritative:v0.1.0

      - name: Build and push postgresql image
        uses: docker/build-push-action@v4
        with:
          context: ./images/postgresql
          file: ./images/postgresql/Dockerfile
          push: true
          tags: |
            pushpak23/powerdns-postgresql:v0.1.0

      - name: Build and push powerdns-admin image
        uses: docker/build-push-action@v4
        with:
          context: ./images/powerdns-admin
          file: ./images/powerdns-admin/Dockerfile
          push: true
          tags: |
            pushpak23/powerdns-admin:v0.1.0
