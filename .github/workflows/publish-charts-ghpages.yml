name: Publish Helm charts to GitHub Pages

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  publish-gh-pages:
    name: Package and publish charts to gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Package charts
        run: |
          set -euo pipefail
          mkdir -p dist
          charts=("charts/powerdns-platform" "charts/powerdns-stack")
          for c in "${charts[@]}"; do
            if [ -d "$c" ]; then
              echo "Packaging $c"
              helm package "$c" --destination dist
            else
              echo "Skipping $c (not found)"
            fi
          done
          helm repo index dist --url https://pushpak-23.github.io/powerdns-operator
          ls -lah dist || true

      - name: Publish charts to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          commit_message: "docs: publish Helm charts"
